<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI Desktop Pet</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: transparent;
            /* NOTE: 不使用 -webkit-app-region: drag，因为它会吞掉所有鼠标事件 */
            /* 窗口拖拽改由 JS + IPC 手动实现 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: default;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 对话气泡 */
        #chat-bubble {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.97);
            border-radius: 18px;
            padding: 16px 24px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            max-width: 540px;
            word-wrap: break-word;
            z-index: 999;

            pointer-events: auto;

            display: none;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        /*
         * 输入框紧贴在气泡下方
         * NOTE: 默认隐藏，点击桌宠后才滑入显示
         */
        #input-area {
            position: absolute;
            /* NOTE: 固定在窗口底部，桌宠下方 */
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);

            pointer-events: auto;

            /* 默认隐藏，用 transform+opacity 做滑入动画 */
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(-8px);
            transition: opacity 0.25s ease, visibility 0.25s ease, transform 0.25s ease;
        }

        #input-area.visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        #input-area input {
            border: none;
            outline: none;
            background: transparent;
            width: 200px;
            font-size: 15px;
            color: #333;
        }

        #input-area input::placeholder {
            color: #aaa;
        }

        #input-area button {
            border: none;
            background: linear-gradient(135deg, #ffb6c1, #ff8fa3);
            color: white;
            border-radius: 20px;
            padding: 7px 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        #input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(255, 143, 163, 0.5);
        }

        #input-area button:active {
            transform: scale(0.97);
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/live2dcubismcore@1.0.2/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>

<body>

    <div id="chat-bubble"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="说点什么吧..." />
        <button onclick="sendMessage()">发送</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        window.PIXI = PIXI;

        // ===================== 手动窗口拖拽（替代 CSS drag） =====================
        const { ipcRenderer } = require('electron');
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;

        document.addEventListener('mousedown', (e) => {
            // 点在输入框或气泡上时不启动拖拽
            if (e.target.closest('#input-area') || e.target.closest('#chat-bubble')) return;
            isDragging = true;
            dragStartX = e.screenX;
            dragStartY = e.screenY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.screenX - dragStartX;
            const dy = e.screenY - dragStartY;
            dragStartX = e.screenX;
            dragStartY = e.screenY;
            ipcRenderer.send('window-drag', { dx, dy });
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        let bubbleTimer = null;
        let isChatting = false;

        // 输入框自动收起的计时器
        let hideInputTimer = null;

        const inputArea = document.getElementById('input-area');
        const bubble = document.getElementById('chat-bubble');

        // 打招呼语（点击桌宠时随机选一句）
        const GREETINGS = [
            "哈？又来烦我了？...才不是欢迎你呢(≖_≖)",
            "喂！手别乱点，很痒的好不好！",
            "啧，想说什么就说！别磨磨蹭蹭的。",
            "你终于来了...才不是在等你啊！哼(ˉ▽～)",
            "有什么事吗？说完赶紧走，我很忙的(///-///)",
        ];

        // ===================== 气泡显示 =====================

        function showBubble(text, duration = 12000) {
            if (bubbleTimer) {
                clearTimeout(bubbleTimer);
                bubbleTimer = null;
            }

            bubble.style.display = 'block';
            setTimeout(() => { bubble.style.opacity = 1; }, 10);
            bubble.innerText = text;

            bubbleTimer = setTimeout(() => {
                bubble.style.opacity = 0;
                setTimeout(() => {
                    if (bubble.style.opacity == 0) {
                        bubble.style.display = 'none';
                    }
                }, 400);
            }, duration);
        }

        // ===================== 输入框显隐 =====================

        /**
         * 点击桌宠时呼出输入框，同时显示打招呼气泡
         * 5 秒无操作后自动收起
         */
        function openInputArea() {
            // 随机选一句打招呼
            const greeting = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
            showBubble(greeting, 5000);

            inputArea.classList.add('visible');

            // 重置自动收起计时
            resetHideInputTimer();

            // 聚焦输入框，方便直接打字
            setTimeout(() => {
                document.getElementById('user-input').focus();
            }, 300);
        }

        function closeInputArea() {
            inputArea.classList.remove('visible');
            if (hideInputTimer) {
                clearTimeout(hideInputTimer);
                hideInputTimer = null;
            }
        }

        function resetHideInputTimer() {
            if (hideInputTimer) clearTimeout(hideInputTimer);
            // 5 秒无操作自动收起
            hideInputTimer = setTimeout(() => {
                if (!isChatting) {
                    closeInputArea();
                }
            }, 5000);
        }

        // 用户在输入框内操作时重置计时
        document.getElementById('user-input').addEventListener('keydown', resetHideInputTimer);

        // ===================== 发送消息 =====================

        async function sendMessage() {
            const inputElement = document.getElementById('user-input');
            const message = inputElement.value.trim();

            if (!message) return;

            inputElement.value = '';
            showBubble("嗯...让我想想...", 30000); // 等待回复期间气泡持续显示
            isChatting = true;
            resetHideInputTimer(); // 发送后重置输入框计时

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: message })
                });

                const data = await response.json();
                // 胡桃回复后展示 5 秒
                showBubble(data.reply, 5000);

                isChatting = false;
                if (window.petModel) {
                    playRandomMotion(window.petModel, true);
                }

                // 回复后再给 5 秒才收起输入框
                if (hideInputTimer) clearTimeout(hideInputTimer);
                hideInputTimer = setTimeout(() => {
                    closeInputArea();
                }, 5000);

            } catch (error) {
                isChatting = false;
                showBubble("啊哦，连接不到大脑(后端)了~");
                console.error(error);
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ===================== Live2D 初始化 =====================

        function playRandomMotion(model, suppressText = false) {
            if (isChatting) return;

            const motions = model.internalModel.settings.motions;
            if (!motions) return;

            const groups = Object.keys(motions);
            if (groups.length === 0) return;

            const randomGroup = groups[Math.floor(Math.random() * groups.length)];
            const motionList = motions[randomGroup];
            const randomIndex = Math.floor(Math.random() * motionList.length);
            const motionData = motionList[randomIndex];

            model.motion(randomGroup, randomIndex, 3);

            if (motionData.Text && !suppressText) {
                showBubble(motionData.Text);
            }
        }

        async function initPet() {
            const app = new PIXI.Application({
                view: document.getElementById('canvas'),
                transparent: true,
                autoDensity: true,
                resizeTo: window
            });

            //const modelUrl = '../../assets/koharu/koharu.model3.json';
            // const modelUrl = '../../assets/haruto/haruto.model3.json';
            //const modelUrl = '../../assets/Nahida/Nahida.model3.json';
            const modelUrl = '../../assets/hutao/1.model3.json';

            try {
                const live2dModel = await PIXI.live2d.Live2DModel.from(modelUrl);
                app.stage.addChild(live2dModel);

                live2dModel.scale.set(0.017);
                live2dModel.x = app.screen.width / 2 - live2dModel.width / 2;
                live2dModel.y = app.screen.height / 2 - live2dModel.height / 2;

                window.petModel = live2dModel;

                // NOTE: 双击窗口区域呼出对话框，避免拖拽时单击误触
                live2dModel.interactive = true;
                document.getElementById('canvas').addEventListener('dblclick', () => {
                    openInputArea();
                    playRandomMotion(live2dModel, true);
                });

                // 挂机随机动作（20 秒一次）
                setInterval(() => {
                    playRandomMotion(live2dModel);
                }, 30000);

            } catch (error) {
                console.error("模型加载失败了！", error);
            }
        }

        initPet();
    </script>
</body>

</html>
